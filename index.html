<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilal Delivery - The B-Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-orange: #f26522; /* اللون البرتقالي من هويتك */
            --dark-brown: #4e342e;    /* اللون البني المتناسق */
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: #f9f9f9; 
            text-align: center; 
            color: #333;
        }
        header { 
            background: linear-gradient(135deg, var(--primary-orange), var(--dark-brown)); 
            color: white; 
            padding: 40px 20px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .logo { 
            max-width: 300px; 
            height: auto; 
            border-radius: 15px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            background-color: white;
            padding: 5px;
        }
        .tagline { font-size: 1.2rem; margin-top: 15px; opacity: 0.9; }
        .container { padding: 30px 15px; }
        .product-card { 
            background: white; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
            display: inline-block; 
            width: 90%; 
            max-width: 350px;
            border: 1px solid #eee;
        }
        .product-img { width: 100%; border-radius: 10px; margin-bottom: 15px; }
        .price { color: var(--primary-orange); font-size: 1.5rem; font-weight: bold; margin: 10px 0; }
        .btn-whatsapp { 
            background-color: #25D366; 
            color: white; 
            padding: 15px 25px; 
            text-decoration: none; 
            border-radius: 30px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-whatsapp:hover { transform: scale(1.05); background-color: #128C7E; }
        footer { background: #222; color: white; padding: 30px; margin-top: 50px; }
        .social-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .social-links a { color: white; font-size: 1.5rem; transition: 0.3s; }
        .social-links a:hover { color: var(--primary-orange); }
    </style>
</head>
<body>

    <header>
        <img src="1776775524990.png" alt="The B-Store Logo" class="logo">
        <p class="tagline">توصيل أسرع.. ثقة أكبر في تونس 🇹🇳</p>
    </header>

    <div class="container">
        <div class="product-card">
            <img src="https://via.placeholder.com/300x300?text=Product+Image" alt="عطر نسيم البحر" class="product-img">
            <h3>عطر نسيم البحر المميز</h3>
            <p class="price">45 د.ت</p>
            <a href="https://wa.me/21620000000?text=مرحباً بلال، أريد طلب عطر نسيم البحر" class="btn-whatsapp">
                <i class="fab fa-whatsapp"></i> اطلب عبر واتساب
            </a>
        </div>
    </div>

    <footer>
        <div class="social-links">
            <a href="https://www.tiktok.com/@deliverybila" target="_blank"><i class="fab fa-tiktok"></i></a>
            <a href="https://wa.me/21620000000" target="_blank"><i class="fab fa-whatsapp"></i></a>
        </div>
        <p>© 2026 Bilal Delivery - جميع الحقوق محفوظة</p>
    </footer>

</body>
</html>
