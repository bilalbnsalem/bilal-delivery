<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilal Delivery - المتجر الرسمي</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <img src="1000016014.png" alt="The B-Store Logo" class="main-logo">
            <p class="tagline">توصيل أسرع.. ثقة أكبر في تونس</p>
        </div>
    </header>

    <main class="container">
        <section class="welcome-section">

            <p>تصفح أفضل العروض والخدمات المتوفرة الآن</p>
        </section>

        <div class="product-grid">
            <div class="product-card">
                <img src="https://via.placeholder.com/150" alt="عطر نسيم البحر">
                <h3>عطر نسيم البحر</h3>
                <p class="price">45 د.ت</p>
                <a href="order.html" class="btn-order">اطلب الآن</a>
            </div>

            <div class="product-card">
                <img src="https://via.placeholder.com/150" alt="خدمة توصيل سريع">
                <h3>خدمة توصيل طرود</h3>
                <p class="price">حسب المسافة</p>
                <a href="order.html" class="btn-order">اطلب الآن</a>
            </div>
        </div>
    </main>

    <footer>
        <div class="social-links">
            <p>تواصل معنا عبر منصاتنا:</p>
            <a href="https://wa.me/216XXXXXXXX" class="social-icon whatsapp"><i class="fab fa-whatsapp"></i></a>
            <a href="https://www.tiktok.com/@XXXX" class="social-icon tiktok"><i class="fab fa-tiktok"></i></a>
            <a href="https://facebook.com/XXXX" class="social-icon facebook"><i class="fab fa-facebook"></i></a>
            <a href="https://heylink.me/deliverybila" class="social-icon heylink"><i class="fas fa-link"></i></a>
        </div>
        <p class="copy">© 2026 Bilal Delivery - جميع الحقوق محفوظة</p>
    </footer>

</html>
