<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد الطلب - Bilal Delivery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>تأكيد طلبك</h1>
    </header>
    <main class="container">
        <form>
            <label>الاسم الكامل:</label><br>
            <input type="text" placeholder="اكتب اسمك هنا" required><br><br>
            
            <label>رقم الهاتف:</label><br>
            <input type="tel" placeholder="216xxxxxxx" required><br><br>
            
            <label>العنوان (الولاية والمدينة):</label><br>
            <textarea placeholder="مثلاً: أريانة، رواد" required></textarea><br><br>
            
            <button type="submit" class="buy-btn">إرسال الطلب</button>
        </form>
    </main>
</body>
</html>
